<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yearbook Invitation</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,600&family=Cinzel:wght@400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cream: #f5f0e8;
    --blush: #f2e8e8;
    --rose: #7a2d3a;
    --dusty: #c49aa0;
    --mauve: #9c6b77;
    --ink: #2a1a1f;
    --gold: #b8976a;
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #ede5e0 0%, #ddd3d8 50%, #e8dfe5 100%);
    font-family: 'Cormorant Garamond', serif;
    overflow-x: hidden;
  }

  .scene {
    perspective: 1200px;
    width: 100%;
    max-width: 520px;
    padding: 24px;
  }

  .card {
    position: relative;
    background: var(--cream);
    border-radius: 2px;
    padding: 0;
    box-shadow:
      0 2px 4px rgba(42,26,31,0.06),
      0 8px 24px rgba(42,26,31,0.12),
      0 24px 64px rgba(42,26,31,0.18);
    animation: cardReveal 1.4s cubic-bezier(0.22,1,0.36,1) forwards;
    transform: translateY(40px) rotateX(6deg);
    opacity: 0;
    overflow: hidden;
  }

  @keyframes cardReveal {
    to { transform: translateY(0) rotateX(0deg); opacity: 1; }
  }

  /* Noise texture overlay */
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 10;
    opacity: 0.4;
  }

  /* Top color wash */
  .card-wash {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 40%;
    background: linear-gradient(180deg, rgba(196,154,160,0.15) 0%, transparent 100%);
    pointer-events: none;
  }

  .inner {
    position: relative;
    z-index: 2;
    padding: 48px 40px 44px;
  }

  /* ── ORNATE BORDER ── */
  .border-wrap {
    position: absolute;
    inset: 10px;
    pointer-events: none;
    z-index: 3;
  }

  .border-wrap svg { width: 100%; height: 100%; }

  /* ── CORNER DOTS ── */
  .dot {
    position: absolute;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--rose);
    opacity: 0.7;
  }
  .dot.tl { top: 20px; left: 20px; }
  .dot.tr { top: 20px; right: 20px; }
  .dot.bl { bottom: 20px; left: 20px; }
  .dot.br { bottom: 20px; right: 20px; }

  /* ── HEADER TEXT ── */
  .eyebrow {
    text-align: center;
    font-family: 'Cinzel', serif;
    font-size: 9.5px;
    letter-spacing: 4px;
    color: var(--mauve);
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 0.8s 0.5s ease forwards;
    margin-bottom: 18px;
  }

  /* ── LAUREL EMBLEM ── */
  .emblem {
    display: flex;
    justify-content: center;
    margin-bottom: 22px;
    opacity: 0;
    animation: fadeUp 0.8s 0.7s ease forwards;
  }

  .emblem svg {
    width: 160px;
    height: 160px;
  }

  /* ── DIVIDER ── */
  .divider-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin: 20px 0;
    opacity: 0;
    animation: fadeUp 0.8s 1.0s ease forwards;
  }

  .divider-line::before,
  .divider-line::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--dusty), transparent);
  }

  .divider-icon { color: var(--mauve); font-size: 14px; }

  /* ── NAME ── */
  .name-script {
    text-align: center;
    font-family: 'Great Vibes', cursive;
    font-size: 58px;
    color: var(--rose);
    line-height: 1;
    opacity: 0;
    animation: fadeUp 0.9s 0.85s ease forwards;
    margin-bottom: 2px;
  }

  .yearbook-title {
    text-align: center;
    font-family: 'Cinzel', serif;
    font-size: 34px;
    font-weight: 500;
    letter-spacing: 8px;
    color: var(--ink);
    opacity: 0;
    animation: fadeUp 0.9s 1.0s ease forwards;
    line-height: 1.1;
  }

  /* ── DATE BLOCK ── */
  .date-block {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin: 28px 0 22px;
    opacity: 0;
    animation: fadeUp 0.8s 1.15s ease forwards;
  }

  .date-part {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--mauve);
    text-transform: uppercase;
    width: 56px;
    text-align: center;
    flex-shrink: 0;
  }

  .date-circle {
    width: 54px; height: 54px;
    border-radius: 50%;
    border: 1.5px solid var(--rose);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .date-num {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--rose);
  }

  .date-sep {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--dusty), transparent);
  }

  .date-sep.r {
    background: linear-gradient(90deg, transparent, var(--dusty), transparent);
  }

  /* ── VENUE INFO ── */
  .venue {
    text-align: center;
    opacity: 0;
    animation: fadeUp 0.8s 1.3s ease forwards;
  }

  .venue-name {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 3.5px;
    color: var(--ink);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .venue-time {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 300;
    letter-spacing: 3px;
    color: var(--mauve);
    font-style: italic;
  }

  /* ── BOTTOM FLOURISH ── */
  .bottom-flourish {
    display: flex;
    justify-content: center;
    margin-top: 28px;
    opacity: 0;
    animation: fadeUp 0.8s 1.45s ease forwards;
  }

  .bottom-flourish svg { width: 140px; height: 32px; }

  /* ── SHIMMER ON HOVER ── */
  .card:hover .yearbook-title { color: var(--rose); transition: color 0.6s ease; }
  .card:hover { box-shadow: 0 4px 8px rgba(42,26,31,0.08), 0 16px 40px rgba(42,26,31,0.16), 0 40px 80px rgba(42,26,31,0.22); transition: box-shadow 0.4s ease; }

  /* ── FLOATING PETALS ── */
  .petal { position: fixed; pointer-events: none; z-index: 0; font-size: 14px; opacity: 0; animation: fall linear infinite; }
  @keyframes fall {
    0%   { opacity: 0; transform: translateY(-20px) rotate(0deg); }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.4; }
    100% { opacity: 0; transform: translateY(100vh) rotate(360deg); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Responsive */
  @media (max-width: 480px) {
    .inner { padding: 36px 28px 32px; }
    .name-script { font-size: 46px; }
    .yearbook-title { font-size: 26px; letter-spacing: 5px; }
  }
</style>
</head>
<body>

<!-- Floating petals -->
<div class="petal" style="left:5%;animation-duration:9s;animation-delay:0s;">✦</div>
<div class="petal" style="left:15%;animation-duration:12s;animation-delay:2s;color:#c49aa0;">✦</div>
<div class="petal" style="left:75%;animation-duration:10s;animation-delay:1s;color:#9c6b77;">✦</div>
<div class="petal" style="left:88%;animation-duration:14s;animation-delay:3s;">✦</div>
<div class="petal" style="left:45%;animation-duration:11s;animation-delay:4s;color:#b8976a;">✦</div>
<div class="petal" style="left:60%;animation-duration:13s;animation-delay:0.5s;color:#c49aa0;">✦</div>

<div class="scene">
  <div class="card">
    <div class="card-wash"></div>

    <!-- Corner dots -->
    <div class="dot tl"></div>
    <div class="dot tr"></div>
    <div class="dot bl"></div>
    <div class="dot br"></div>

    <!-- Ornate border SVG -->
    <div class="border-wrap">
      <svg viewBox="0 0 440 620" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <!-- Corner ornaments -->
        <!-- Top-left -->
        <path d="M20,20 Q20,12 28,12" stroke="#c49aa0" stroke-width="1" opacity="0.6"/>
        <path d="M20,20 Q12,20 12,28" stroke="#c49aa0" stroke-width="1" opacity="0.6"/>
        <path d="M28,12 L80,12" stroke="#c49aa0" stroke-width="0.8" opacity="0.5"/>
        <path d="M12,28 L12,80" stroke="#c49aa0" stroke-width="0.8" opacity="0.5"/>
        <circle cx="20" cy="20" r="3" fill="none" stroke="#9c6b77" stroke-width="1" opacity="0.5"/>
        <!-- Top-right -->
        <path d="M420,20 Q420,12 412,12" stroke="#c49aa0" stroke-width="1" opacity="0.6"/>
        <path d="M420,20 Q428,20 428,28" stroke="#c49aa0" stroke-width="1" opacity="0.6"/>
        <path d="M412,12 L360,12" stroke="#c49aa0" stroke-width="0.8" opacity="0.5"/>
        <path d="M428,28 L428,80" stroke="#c49aa0" stroke-width="0.8" opacity="0.5"/>
        <circle cx="420" cy="20" r="3" fill="none" stroke="#9c6b77" stroke-width="1" opacity="0.5"/>
        <!-- Bottom-left -->
        <path d="M20,600 Q20,608 28,608" stroke="#c49aa0" stroke-width="1" opacity="0.6"/>
        <path d="M20,600 Q12,600 12,592" stroke="#c49aa0" stroke-width="1" opacity="0.6"/>
        <path d="M28,608 L80,608" stroke="#c49aa0" stroke-width="0.8" opacity="0.5"/>
        <path d="M12,592 L12,540" stroke="#c49aa0" stroke-width="0.8" opacity="0.5"/>
        <circle cx="20" cy="600" r="3" fill="none" stroke="#9c6b77" stroke-width="1" opacity="0.5"/>
        <!-- Bottom-right -->
        <path d="M420,600 Q420,608 412,608" stroke="#c49aa0" stroke-width="1" opacity="0.6"/>
        <path d="M420,600 Q428,600 428,592" stroke="#c49aa0" stroke-width="1" opacity="0.6"/>
        <path d="M412,608 L360,608" stroke="#c49aa0" stroke-width="0.8" opacity="0.5"/>
        <path d="M428,592 L428,540" stroke="#c49aa0" stroke-width="0.8" opacity="0.5"/>
        <circle cx="420" cy="600" r="3" fill="none" stroke="#9c6b77" stroke-width="1" opacity="0.5"/>

        <!-- Top center flourish -->
        <path d="M160,12 Q180,6 200,12 Q220,6 240,12 Q260,6 280,12" stroke="#c49aa0" stroke-width="0.8" fill="none" opacity="0.5"/>
        <!-- Bottom center flourish -->
        <path d="M160,608 Q180,614 200,608 Q220,614 240,608 Q260,614 280,608" stroke="#c49aa0" stroke-width="0.8" fill="none" opacity="0.5"/>
        <!-- Side lines -->
        <path d="M12,160 L12,460" stroke="#c49aa0" stroke-width="0.5" opacity="0.3" stroke-dasharray="2,4"/>
        <path d="M428,160 L428,460" stroke="#c49aa0" stroke-width="0.5" opacity="0.3" stroke-dasharray="2,4"/>
      </svg>
    </div>

    <div class="inner">

      <!-- Eyebrow -->
      <p class="eyebrow">You are invited to</p>

      <!-- Laurel Emblem -->
      <div class="emblem">
        <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
          <g transform="translate(100,100)">

            <!-- LEFT BRANCH -->
            <g fill="#9c6b77" fill-opacity="0.18" stroke="#9c6b77" stroke-width="0.9">
              <ellipse cx="-50" cy="25"  rx="8" ry="4" transform="rotate(-30 -50 25)"/>
              <ellipse cx="-54" cy="15"  rx="8" ry="4" transform="rotate(-40 -54 15)"/>
              <ellipse cx="-57" cy="4"   rx="8" ry="4" transform="rotate(-50 -57 4)"/>
              <ellipse cx="-57" cy="-8"  rx="8" ry="4" transform="rotate(-60 -57 -8)"/>
              <ellipse cx="-55" cy="-20" rx="8" ry="4" transform="rotate(-72 -55 -20)"/>
              <ellipse cx="-50" cy="-31" rx="8" ry="4" transform="rotate(-84 -50 -31)"/>
              <ellipse cx="-42" cy="-40" rx="8" ry="4" transform="rotate(-96 -42 -40)"/>
              <ellipse cx="-32" cy="-49" rx="8" ry="4" transform="rotate(-108 -32 -49)"/>
              <ellipse cx="-20" cy="-55" rx="8" ry="4" transform="rotate(-120 -20 -55)"/>
              <ellipse cx="-7"  cy="-59" rx="8" ry="4" transform="rotate(-132 -7 -59)"/>
            </g>
            <path d="M -46,30 A 58,58 0 0,1 -6,-58" stroke="#9c6b77" stroke-width="1.2" fill="none" stroke-linecap="round"/>

            <!-- RIGHT BRANCH -->
            <g fill="#9c6b77" fill-opacity="0.18" stroke="#9c6b77" stroke-width="0.9">
              <ellipse cx="50"  cy="25"  rx="8" ry="4" transform="rotate(30 50 25)"/>
              <ellipse cx="54"  cy="15"  rx="8" ry="4" transform="rotate(40 54 15)"/>
              <ellipse cx="57"  cy="4"   rx="8" ry="4" transform="rotate(50 57 4)"/>
              <ellipse cx="57"  cy="-8"  rx="8" ry="4" transform="rotate(60 57 -8)"/>
              <ellipse cx="55"  cy="-20" rx="8" ry="4" transform="rotate(72 55 -20)"/>
              <ellipse cx="50"  cy="-31" rx="8" ry="4" transform="rotate(84 50 -31)"/>
              <ellipse cx="42"  cy="-40" rx="8" ry="4" transform="rotate(96 42 -40)"/>
              <ellipse cx="32"  cy="-49" rx="8" ry="4" transform="rotate(108 32 -49)"/>
              <ellipse cx="20"  cy="-55" rx="8" ry="4" transform="rotate(120 20 -55)"/>
              <ellipse cx="7"   cy="-59" rx="8" ry="4" transform="rotate(132 7 -59)"/>
            </g>
            <path d="M 46,30 A 58,58 0 0,0 6,-58" stroke="#9c6b77" stroke-width="1.2" fill="none" stroke-linecap="round"/>

            <!-- BOTTOM BOW -->
            <path d="M -46,30 Q 0,52 46,30" stroke="#9c6b77" stroke-width="1.1" fill="none" stroke-linecap="round"/>
            <circle cx="0" cy="48" r="3" fill="#c49aa0" opacity="0.8"/>
            <path d="M -6,50 Q -14,58 -10,64" stroke="#9c6b77" stroke-width="0.9" fill="none" stroke-linecap="round"/>
            <path d="M  6,50 Q  14,58  10,64" stroke="#9c6b77" stroke-width="0.9" fill="none" stroke-linecap="round"/>

            <!-- CAP GROUP: shifted left by 8px to visually balance the tassel on the right -->
            <g transform="translate(-8, 0)">
              <!-- BG mask -->
              <ellipse cx="0" cy="-8" rx="34" ry="30" fill="#f5f0e8"/>
              <!-- Cap body -->
              <path d="M -24,-14 Q -22,-2 0,-2 Q 22,-2 24,-14 Z" fill="#9c6b77" fill-opacity="0.55"/>
              <!-- Board -->
              <polygon points="0,-32  34,-16  0,-8  -34,-16" fill="#7a2d3a" fill-opacity="0.75"/>
              <!-- Board highlight -->
              <polygon points="0,-32  34,-16  0,-22  -34,-16" fill="#7a2d3a" fill-opacity="0.35"/>
              <!-- Center button -->
              <circle cx="0" cy="-20" r="3" fill="#f5f0e8" opacity="0.6"/>
              <!-- Tassel -->
              <path d="M 34,-16 Q 38,-10 36,0 Q 34,8 37,16" stroke="#7a2d3a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
              <circle cx="37" cy="18" r="3.5" fill="#7a2d3a" opacity="0.8"/>
              <line x1="33" y1="21" x2="30" y2="31" stroke="#7a2d3a" stroke-width="1.3" stroke-linecap="round"/>
              <line x1="37" y1="21" x2="37" y2="32" stroke="#7a2d3a" stroke-width="1.3" stroke-linecap="round"/>
              <line x1="41" y1="21" x2="44" y2="31" stroke="#7a2d3a" stroke-width="1.3" stroke-linecap="round"/>
            </g>

          </g>
        </svg>
      </div>

      <!-- Name -->
      <div class="name-script">Phat's</div>

      <!-- Title -->
      <div class="yearbook-title">YEARBOOK</div>

      <!-- Divider -->
      <div class="divider-line">
        <svg width="24" height="16" viewBox="0 0 24 16" fill="none">
          <path d="M4,8 Q8,4 12,8 Q16,12 20,8" stroke="#c49aa0" stroke-width="1.2" fill="none"/>
          <circle cx="12" cy="8" r="2" fill="#c49aa0" opacity="0.5"/>
        </svg>
      </div>

      <!-- Date block -->
      <div class="date-block">
        <div class="date-part">April</div>
        <div class="date-sep"></div>
        <div class="date-circle">
          <span class="date-num">30</span>
        </div>
        <div class="date-sep r"></div>
        <div class="date-part">2026</div>
      </div>

      <!-- Venue -->
      <div class="venue">
        <p class="venue-name">THPT Chuyen Thang Long</p>
        <p class="venue-time">8:45 — 10:00</p>
      </div>

      <!-- Bottom flourish -->
      <div class="bottom-flourish">
        <svg viewBox="0 0 140 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M10,16 Q25,6 40,16 Q55,26 70,16 Q85,6 100,16 Q115,26 130,16" stroke="#c49aa0" stroke-width="1" fill="none" opacity="0.6"/>
          <circle cx="70" cy="16" r="3" fill="none" stroke="#9c6b77" stroke-width="1" opacity="0.6"/>
          <circle cx="10" cy="16" r="2" fill="#c49aa0" opacity="0.4"/>
          <circle cx="130" cy="16" r="2" fill="#c49aa0" opacity="0.4"/>
        </svg>
      </div>

    </div>
  </div>
</div>

<script>
  // Subtle tilt on mouse move
  const card = document.querySelector('.card');
  const scene = document.querySelector('.scene');

  scene.addEventListener('mousemove', e => {
    const rect = scene.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = (e.clientX - cx) / (rect.width / 2);
    const dy = (e.clientY - cy) / (rect.height / 2);
    card.style.transform = `rotateY(${dx * 4}deg) rotateX(${-dy * 4}deg) translateZ(10px)`;
    card.style.transition = 'transform 0.1s ease';
  });

  scene.addEventListener('mouseleave', () => {
    card.style.transform = 'rotateY(0deg) rotateX(0deg) translateZ(0)';
    card.style.transition = 'transform 0.6s cubic-bezier(0.22,1,0.36,1)';
  });
</script>
</body>
</html>
